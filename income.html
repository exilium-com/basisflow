<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Income Calculator</title>
  <link rel="stylesheet" href="./shared-tools.css">
  <style>
    .content-column {
      padding: 28px;
    }

    .section {
      border-top: 1px solid rgba(20, 37, 47, 0.08);
      padding-top: 18px;
      margin-top: 18px;
    }

    .section:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .section.compact {
      margin-top: 12px;
      padding-top: 12px;
    }

    .section.summary-section {
      margin-top: 12px;
      padding-top: 0;
      border-top: 0;
    }

    .section h2 {
      color: var(--ink);
      font-size: 1.35rem;
      margin-bottom: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .savings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.wide {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.92rem;
      color: var(--ink-soft);
    }

    input, select {
      width: 100%;
      border: 1px solid rgba(20, 37, 47, 0.12);
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      padding: 12px 13px;
      border-radius: 0;
    }

    input:focus,
    select:focus {
      outline: 2px solid rgba(13, 106, 115, 0.12);
      border-color: var(--teal);
      background: #fff;
    }

    .slider-field {
      gap: 10px;
      padding: 14px;
      border: 1px solid rgba(20, 37, 47, 0.08);
      background: rgba(255, 255, 255, 0.34);
    }

    .slider-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .slider-value {
      color: var(--ink);
      font-size: 0.95rem;
      font-weight: 700;
      white-space: nowrap;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 2px;
      padding: 0;
      border: 0;
      background: rgba(20, 37, 47, 0.18);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--teal);
      background: #fff;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--teal);
      background: #fff;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-track {
      height: 2px;
      background: rgba(20, 37, 47, 0.18);
      border: 0;
    }

    .hero-number {
      display: grid;
      gap: 4px;
      padding-bottom: 14px;
    }

    .hero-number span {
      color: var(--ink-soft);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .hero-number strong {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .metric {
      padding-top: 10px;
      border-top: 1px solid rgba(20, 37, 47, 0.1);
    }

    .mini-grid .metric:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .metric .k {
      display: block;
      color: var(--ink-soft);
      font-size: 0.84rem;
      margin-bottom: 4px;
    }

    .metric .v {
      font-size: 1.15rem;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid rgba(20, 37, 47, 0.08);
      vertical-align: top;
    }

    th {
      color: var(--ink-soft);
      font-weight: 700;
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    td:last-child,
    th:last-child {
      text-align: right;
    }

    tbody tr:first-child td {
      padding-top: 0;
    }

    tbody tr:last-child td {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .advanced-panel {
      margin-top: 18px;
      border: 1px solid rgba(20, 37, 47, 0.1);
      background: rgba(255, 255, 255, 0.38);
      overflow: hidden;
    }

    .advanced-panel summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      cursor: pointer;
    }

    .advanced-panel summary::-webkit-details-marker {
      display: none;
    }

    .advanced-title {
      color: var(--ink);
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .advanced-chevron {
      flex: 0 0 auto;
      color: var(--teal-deep);
      font-size: 0.9rem;
      font-weight: 800;
      line-height: 1;
    }

    .advanced-chevron::before {
      content: "+";
    }

    .advanced-panel[open] .advanced-chevron::before {
      content: "\2212";
    }

    .advanced-body {
      padding: 12px 18px 18px;
      border-top: 1px solid rgba(20, 37, 47, 0.08);
    }

    @media (max-width: 640px) {
      .content-column {
        padding: 18px;
      }

      .savings-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <nav class="tool-nav" aria-label="Tools">
      <a class="tool-tab" href="./index.html"><span class="tool-tab-index">00</span><span>Home</span></a>
      <a class="tool-tab is-active" href="./income.html"><span class="tool-tab-index">01</span><span>Income</span></a>
      <a class="tool-tab" href="./mortgage.html"><span class="tool-tab-index">02</span><span>Mortgage</span></a>
      <a class="tool-tab" href="./savings.html"><span class="tool-tab-index">03</span><span>Assets</span></a>
      <a class="tool-tab" href="./expenses.html"><span class="tool-tab-index">04</span><span>Expenses</span></a>
      <a class="tool-tab" href="./tax-config.html"><span class="tool-tab-index">05</span><span>Taxes</span></a>
    </nav>

    <header class="hero">
      <div>
        <h1>Income Calculator</h1>
      </div>
      <button id="resetButton" type="button">Reset</button>
    </header>

    <main class="surface">
      <section class="content-column">
        <div class="section">
          <h2>Income</h2>
          <div class="grid">
            <div class="field">
              <label for="grossSalary">Gross salary</label>
              <input id="grossSalary" type="number" min="0" step="1000">
            </div>
          </div>
        </div>

        <div class="section compact">
          <h2>Retirement Savings</h2>
          <div class="savings-grid">
            <div class="field slider-field">
              <div class="slider-head">
                <label for="employee401k">Employee 401(k)</label>
                <span class="slider-value" id="employee401kValue">$0</span>
              </div>
              <input id="employee401k" type="range" min="0" max="24500" step="100">
            </div>
            <div class="field slider-field">
              <div class="slider-head">
                <label for="matchRate">Employer match rate</label>
                <span class="slider-value" id="matchRateValue">0%</span>
              </div>
              <input id="matchRate" type="range" min="0" max="100" step="1">
            </div>
            <div class="field slider-field">
              <div class="slider-head">
                <label for="megaBackdoorInput">Mega backdoor amount</label>
                <span class="slider-value" id="megaBackdoorInputValue">$0</span>
              </div>
              <input id="megaBackdoorInput" type="range" min="0" max="47500" step="100">
            </div>
            <div class="field slider-field">
              <div class="slider-head">
                <label for="hsaContribution">HSA contribution</label>
                <span class="slider-value" id="hsaContributionValue">$0</span>
              </div>
              <input id="hsaContribution" type="range" min="0" max="4400" step="50">
            </div>
          </div>
        </div>

        <div class="section summary-section">
          <div class="hero-number">
            <span>Estimated Take-Home Per Month</span>
            <strong id="monthlyTakeHome">$0</strong>
          </div>

          <div class="mini-grid">
            <div class="metric">
              <span class="k">Annual take-home</span>
              <span class="v" id="annualTakeHome">$0</span>
            </div>
            <div class="metric">
              <span class="k">Mega backdoor amount</span>
              <span class="v" id="megaBackdoor">$0</span>
            </div>
            <div class="metric">
              <span class="k">Employer match</span>
              <span class="v" id="employerMatch">$0</span>
            </div>
            <div class="metric">
              <span class="k">Total taxes</span>
              <span class="v" id="totalTaxes">$0</span>
            </div>
          </div>
        </div>

        <div class="section">
          <h2>Contribution Breakdown</h2>
          <table>
            <tbody id="contributionTable"></tbody>
          </table>
        </div>

        <div class="section">
          <h2>Tax Breakdown</h2>
          <table>
            <tbody id="taxTable"></tbody>
          </table>
        </div>

        <details id="taxAssumptions" class="advanced-panel">
          <summary>
            <span class="advanced-title">Tax Assumptions</span>
            <span class="advanced-chevron" aria-hidden="true"></span>
          </summary>
          <div class="advanced-body">
            <div class="grid">
              <div class="field">
                <label for="annualAdditions">401(k) annual additions limit</label>
                <input id="annualAdditions" type="number" min="0" step="100">
              </div>
              <div class="field">
                <label for="federalStandardDeduction">Federal standard deduction</label>
                <input id="federalStandardDeduction" type="number" min="0" step="50">
              </div>
              <div class="field">
                <label for="caStandardDeduction">California standard deduction</label>
                <input id="caStandardDeduction" type="number" min="0" step="50">
              </div>
              <div class="field">
                <label for="caSdiRate">CA SDI rate</label>
                <input id="caSdiRate" type="number" min="0" max="10" step="0.1">
              </div>
              <div class="field">
                <label for="includeCaSdi">CA SDI</label>
                <select id="includeCaSdi">
                  <option value="yes">Include</option>
                  <option value="no">Ignore</option>
                </select>
              </div>
            </div>
          </div>
        </details>
      </section>
    </main>
  </div>

  <script src="./shared-tax-config.js"></script>
  <script>
    (() => {
      const COOKIE_NAME = "finance_tools_income_v1";
      const COOKIE_MAX_AGE = 60 * 60 * 24 * 365;

      const defaults = {
        grossSalary: 255000,
        employee401k: 24500,
        annualAdditions: 72000,
        matchRate: 50,
        megaBackdoorInput: 35250,
        hsaContribution: 4400,
        federalStandardDeduction: 16100,
        caStandardDeduction: 5706,
        caSdiRate: 1.3,
        includeCaSdi: "yes"
      };

      const refs = {
        grossSalary: document.getElementById("grossSalary"),
        employee401k: document.getElementById("employee401k"),
        annualAdditions: document.getElementById("annualAdditions"),
        matchRate: document.getElementById("matchRate"),
        megaBackdoorInput: document.getElementById("megaBackdoorInput"),
        hsaContribution: document.getElementById("hsaContribution"),
        employee401kValue: document.getElementById("employee401kValue"),
        matchRateValue: document.getElementById("matchRateValue"),
        megaBackdoorInputValue: document.getElementById("megaBackdoorInputValue"),
        hsaContributionValue: document.getElementById("hsaContributionValue"),
        federalStandardDeduction: document.getElementById("federalStandardDeduction"),
        caStandardDeduction: document.getElementById("caStandardDeduction"),
        caSdiRate: document.getElementById("caSdiRate"),
        includeCaSdi: document.getElementById("includeCaSdi"),
        taxAssumptions: document.getElementById("taxAssumptions"),
        resetButton: document.getElementById("resetButton"),
        monthlyTakeHome: document.getElementById("monthlyTakeHome"),
        annualTakeHome: document.getElementById("annualTakeHome"),
        megaBackdoor: document.getElementById("megaBackdoor"),
        employerMatch: document.getElementById("employerMatch"),
        totalTaxes: document.getElementById("totalTaxes"),
        contributionTable: document.getElementById("contributionTable"),
        taxTable: document.getElementById("taxTable")
      };

      function setCookie(name, value) {
        document.cookie = `${name}=${encodeURIComponent(value)}; max-age=${COOKIE_MAX_AGE}; path=/; samesite=lax`;
      }

      function getCookie(name) {
        return document.cookie
          .split("; ")
          .find((row) => row.startsWith(`${name}=`))
          ?.slice(name.length + 1) ?? "";
      }

      function loadSavedState() {
        try {
          const raw = getCookie(COOKIE_NAME);
          return raw ? JSON.parse(decodeURIComponent(raw)) : null;
        } catch {
          return null;
        }
      }

      function saveState() {
        setCookie(COOKIE_NAME, JSON.stringify({
          grossSalary: refs.grossSalary.value,
          employee401k: refs.employee401k.value,
          annualAdditions: refs.annualAdditions.value,
          matchRate: refs.matchRate.value,
          megaBackdoorInput: refs.megaBackdoorInput.value,
          hsaContribution: refs.hsaContribution.value,
          federalStandardDeduction: refs.federalStandardDeduction.value,
          caStandardDeduction: refs.caStandardDeduction.value,
          caSdiRate: refs.caSdiRate.value,
          includeCaSdi: refs.includeCaSdi.value,
          taxAssumptionsOpen: refs.taxAssumptions.open
        }));
      }

      function usd(value) {
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD",
          maximumFractionDigits: 0
        }).format(Number.isFinite(value) ? value : 0);
      }

      function usdPrecise(value) {
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD",
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        }).format(Number.isFinite(value) ? value : 0);
      }

      function num(input) {
        const parsed = Number.parseFloat(input.value);
        return Number.isFinite(parsed) ? parsed : 0;
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function computeFederalTax(taxableIncome) {
        const config = FinanceTaxConfig.loadConfig();
        return FinanceTaxConfig.computeProgressiveTax(taxableIncome, config.federalBrackets);
      }

      function computeCaliforniaTax(taxableIncome) {
        const config = FinanceTaxConfig.loadConfig();
        return FinanceTaxConfig.computeProgressiveTax(taxableIncome, config.stateBrackets);
      }

      function computeFica(grossSalary, hsaPayrollAmount) {
        const ficaWages = Math.max(0, grossSalary - hsaPayrollAmount);
        const socialSecurityWageBase = 184500;
        const socialSecurity = Math.min(ficaWages, socialSecurityWageBase) * 0.062;
        const medicare = ficaWages * 0.0145;
        const additionalMedicare = Math.max(0, ficaWages - 200000) * 0.009;

        return {
          socialSecurity,
          medicare,
          additionalMedicare,
          total: socialSecurity + medicare + additionalMedicare
        };
      }

      function computeSavings(inputs) {
        const matchRate = clamp(inputs.matchRate / 100, 0, 5);
        const employee401k = Math.max(0, inputs.employee401k);
        const annualAdditions = Math.max(0, inputs.annualAdditions);
        const employerMatch = employee401k * matchRate;
        const availableMegaRoom = Math.max(0, annualAdditions - employee401k - employerMatch);
        const mega = clamp(Math.max(0, inputs.megaBackdoorInput), 0, availableMegaRoom);

        return {
          employerMatch,
          mega,
          availableMegaRoom
        };
      }

      function readInputs() {
        return {
          grossSalary: num(refs.grossSalary),
          employee401k: num(refs.employee401k),
          annualAdditions: num(refs.annualAdditions),
          matchRate: num(refs.matchRate),
          megaBackdoorInput: num(refs.megaBackdoorInput),
          hsaContribution: num(refs.hsaContribution),
          federalStandardDeduction: num(refs.federalStandardDeduction),
          caStandardDeduction: num(refs.caStandardDeduction),
          caSdiRate: num(refs.caSdiRate) / 100,
          includeCaSdi: refs.includeCaSdi.value === "yes"
        };
      }

      function calculate(inputs) {
        const savings = computeSavings(inputs);
        const federalAdjustedGross = Math.max(0, inputs.grossSalary - inputs.employee401k - inputs.hsaContribution);
        const federalTaxableIncome = Math.max(0, federalAdjustedGross - inputs.federalStandardDeduction);
        const federalTax = computeFederalTax(federalTaxableIncome);

        const californiaAdjustedGross = Math.max(0, inputs.grossSalary - inputs.employee401k);
        const californiaTaxableIncome = Math.max(0, californiaAdjustedGross - inputs.caStandardDeduction);
        const californiaTax = computeCaliforniaTax(californiaTaxableIncome);

        const fica = computeFica(inputs.grossSalary, inputs.hsaContribution);
        const caSdi = inputs.includeCaSdi ? inputs.grossSalary * inputs.caSdiRate : 0;
        const totalTaxes = federalTax + californiaTax + fica.total + caSdi;

        const annualTakeHome =
          inputs.grossSalary
          - inputs.employee401k
          - inputs.hsaContribution
          - savings.mega
          - totalTaxes;

        return {
          ...savings,
          federalAdjustedGross,
          federalTaxableIncome,
          federalTax,
          californiaAdjustedGross,
          californiaTaxableIncome,
          californiaTax,
          fica,
          caSdi,
          totalTaxes,
          annualTakeHome,
          monthlyTakeHome: annualTakeHome / 12
        };
      }

      function render(inputs, results) {
        refs.employee401kValue.textContent = usd(inputs.employee401k);
        refs.matchRateValue.textContent = `${Math.round(inputs.matchRate)}%`;
        refs.megaBackdoorInput.max = String(Math.max(0, Math.round(results.availableMegaRoom)));
        if (Number.parseFloat(refs.megaBackdoorInput.value) !== results.mega) {
          refs.megaBackdoorInput.value = String(results.mega);
        }
        refs.megaBackdoorInputValue.textContent = usd(results.mega);
        refs.hsaContributionValue.textContent = usd(inputs.hsaContribution);
        refs.monthlyTakeHome.textContent = usdPrecise(results.monthlyTakeHome);
        refs.annualTakeHome.textContent = usdPrecise(results.annualTakeHome);
        refs.megaBackdoor.textContent = usd(results.mega);
        refs.employerMatch.textContent = usd(results.employerMatch);
        refs.totalTaxes.textContent = usd(results.totalTaxes);

        refs.contributionTable.innerHTML = [
          ["Employee 401(k)", inputs.employee401k],
          ["Employer match", results.employerMatch],
          ["Mega backdoor after-tax", results.mega],
          ["HSA", inputs.hsaContribution]
        ].map(([label, value]) => `<tr><td>${label}</td><td>${usdPrecise(value)}</td></tr>`).join("");

        refs.taxTable.innerHTML = [
          ["Federal income tax", results.federalTax],
          ["California income tax", results.californiaTax],
          ["Social Security", results.fica.socialSecurity],
          ["Medicare", results.fica.medicare],
          ["Additional Medicare", results.fica.additionalMedicare],
          ["CA SDI", results.caSdi]
        ].map(([label, value]) => `<tr><td>${label}</td><td>${usdPrecise(value)}</td></tr>`).join("");
      }

      function recalculate() {
        const inputs = readInputs();
        const results = calculate(inputs);
        render(inputs, results);
        saveState();
      }

      function applyDefaults() {
        refs.grossSalary.value = defaults.grossSalary;
        refs.employee401k.value = defaults.employee401k;
        refs.annualAdditions.value = defaults.annualAdditions;
        refs.matchRate.value = defaults.matchRate;
        refs.megaBackdoorInput.value = defaults.megaBackdoorInput;
        refs.hsaContribution.value = defaults.hsaContribution;
        refs.federalStandardDeduction.value = defaults.federalStandardDeduction;
        refs.caStandardDeduction.value = defaults.caStandardDeduction;
        refs.caSdiRate.value = defaults.caSdiRate;
        refs.includeCaSdi.value = defaults.includeCaSdi;
        refs.taxAssumptions.open = false;
      }

      function applySavedState(savedState) {
        if (!savedState || typeof savedState !== "object") {
          applyDefaults();
          return;
        }

        refs.grossSalary.value = savedState.grossSalary ?? defaults.grossSalary;
        refs.employee401k.value = savedState.employee401k ?? defaults.employee401k;
        refs.annualAdditions.value = savedState.annualAdditions ?? defaults.annualAdditions;
        refs.matchRate.value = savedState.matchRate ?? defaults.matchRate;
        refs.megaBackdoorInput.value = savedState.megaBackdoorInput ?? defaults.megaBackdoorInput;
        refs.hsaContribution.value = savedState.hsaContribution ?? defaults.hsaContribution;
        refs.federalStandardDeduction.value = savedState.federalStandardDeduction ?? defaults.federalStandardDeduction;
        refs.caStandardDeduction.value = savedState.caStandardDeduction ?? defaults.caStandardDeduction;
        refs.caSdiRate.value = savedState.caSdiRate ?? defaults.caSdiRate;
        refs.includeCaSdi.value = savedState.includeCaSdi ?? defaults.includeCaSdi;
        refs.taxAssumptions.open = Boolean(savedState.taxAssumptionsOpen);
      }

      Object.values(refs).forEach((node) => {
        if (node instanceof HTMLInputElement || node instanceof HTMLSelectElement) {
          node.addEventListener("input", recalculate);
          node.addEventListener("change", recalculate);
        }
      });

      refs.taxAssumptions.addEventListener("toggle", saveState);

      refs.resetButton.addEventListener("click", () => {
        applyDefaults();
        recalculate();
      });

      applySavedState(loadSavedState());
      recalculate();
    })();
  </script>
</body>
</html>
